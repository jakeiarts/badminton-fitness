<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="A personal badminton fitness training app for a returning player. Works offline, no login required." />
  <title>Badminton Fitness — Personal Training</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Skip link for accessibility -->
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Top app bar -->
  <header class="appbar" role="banner">
    <div class="appbar-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🏸</span>
        <span class="brand-text">Badminton Fitness</span>
      </div>
      <div class="appbar-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle dark / light mode">
          <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
        <button id="printBtn" class="icon-btn" type="button" aria-label="Print friendly view" title="Print friendly view">
          <span aria-hidden="true">🖨️</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content: each tab is a <section> toggled by JS -->
  <main id="main" class="main" role="main" tabindex="-1">
    <section id="tab-today" class="tab-panel" data-tab="today" aria-label="Today"></section>
    <section id="tab-weekly" class="tab-panel" data-tab="weekly" aria-label="Weekly Plan" hidden></section>
    <section id="tab-library" class="tab-panel" data-tab="library" aria-label="Exercise Library" hidden></section>
    <section id="tab-running" class="tab-panel" data-tab="running" aria-label="Running" hidden></section>
    <section id="tab-footwork" class="tab-panel" data-tab="footwork" aria-label="Badminton Footwork" hidden></section>
    <section id="tab-progress" class="tab-panel" data-tab="progress" aria-label="Progress" hidden></section>
    <section id="tab-guidance" class="tab-panel" data-tab="guidance" aria-label="Guidance" hidden></section>
    <section id="tab-settings" class="tab-panel" data-tab="settings" aria-label="Settings" hidden></section>
  </main>

  <!-- Bottom navigation (sticky on phones, becomes a top row on desktop) -->
  <nav class="bottomnav" role="navigation" aria-label="Main">
    <button class="navbtn is-active" data-go="today" type="button">
      <span class="navbtn-icon" aria-hidden="true">📅</span><span class="navbtn-label">Today</span>
    </button>
    <button class="navbtn" data-go="weekly" type="button">
      <span class="navbtn-icon" aria-hidden="true">🗓️</span><span class="navbtn-label">Week</span>
    </button>
    <button class="navbtn" data-go="library" type="button">
      <span class="navbtn-icon" aria-hidden="true">📚</span><span class="navbtn-label">Library</span>
    </button>
    <button class="navbtn" data-go="running" type="button">
      <span class="navbtn-icon" aria-hidden="true">🏃</span><span class="navbtn-label">Run</span>
    </button>
    <button class="navbtn" data-go="footwork" type="button">
      <span class="navbtn-icon" aria-hidden="true">🏸</span><span class="navbtn-label">Footwork</span>
    </button>
    <button class="navbtn" data-go="progress" type="button">
      <span class="navbtn-icon" aria-hidden="true">📈</span><span class="navbtn-label">Progress</span>
    </button>
    <button class="navbtn" data-go="guidance" type="button">
      <span class="navbtn-icon" aria-hidden="true">💡</span><span class="navbtn-label">Guide</span>
    </button>
    <button class="navbtn" data-go="settings" type="button">
      <span class="navbtn-icon" aria-hidden="true">⚙️</span><span class="navbtn-label">Settings</span>
    </button>
  </nav>

  <!-- Lightweight toast container -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
